<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registry</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: sans-serif;
            margin: 0;
        }

        /* Layout */
        .container {
            width: 90%;
            margin: auto;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .col {
            flex: 1;
            min-width: 200px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px;
            border-bottom: 3px solid #ff6a00;
        }

        /* Card */
        .card {
            background: #1e1e1e;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #333;
        }

        /* Inputs */
        input {
            width: 100%;
            padding: 10px;
            background: #2b2b2b;
            border: 1px solid #444;
            color: white;
        }

        /* Buttons */
        .btn {
            background: #ff6a00;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background: #e05a00;
        }

        .btn-secondary {
            background: gray;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #444;
        }

        th {
            color: #ff6a00;
        }

        tr:hover {
            background: #2a2a2a;
        }
    </style>
</head>

<body>

<div class="header">
    <h1 style="color:#ff6a00;">Campus Student Registry</h1>
</div>

<div class="container">

    <!-- FORM -->
    <div class="card">
        <h3 id="formTitle">Register New Student</h3>
        <input type="hidden" id="studentID">

        <div class="row">
            <div class="col">
                <input type="text" id="name" placeholder="Name">
            </div>
            <div class="col">
                <input type="email" id="email" placeholder="Email">
            </div>
            <div class="col">
                <input type="text" id="major" placeholder="Major">
            </div>
            <div class="col">
                <button class="btn" id="saveBtn">Save</button>
            </div>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="card">
        <div class="row">
            <div class="col" style="flex: 2;">
                <input type="text" id="searchMajor" placeholder="Search by Major">
            </div>

            <div class="col" style="flex: 1; display:flex; gap:10px;">
                <button class="btn" id="searchBtn">Search</button>
                <button class="btn-secondary" id="resetBtn">Reset</button>
            </div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Major</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>
    </div>

    <button class="btn" onclick="window.location.href='index.html'">Back</button>

</div>


<script>
        var API = "/api/students";

        function refresh() {
            $.get(API, function(data) {
                var htmlRows = "";
                for (var i = 0; i < data.length; i++) {
                    var s = data[i];
                    htmlRows += "<tr>";
                    htmlRows += "<td class='ps-4'>" + s.studentID + "</td>";
                    htmlRows += "<td><b>" + s.name + "</b></td>";
                    htmlRows += "<td>" + s.email + "</td>";
                    htmlRows += "<td>" + s.major + "</td>";
                    htmlRows += "<td class='text-center'>";

                    htmlRows += `<button class="btn btn-sm btn-outline-info me-2" onclick="editStudent(${s.studentID}, '${s.name}', '${s.email}', '${s.major}')">Edit</button>`;
                    htmlRows += `<button class="btn btn-sm btn-outline-danger" onclick="deleteStudent(${s.studentID})">Delete</button>`;
                    htmlRows += "</td>";
                    htmlRows += "</tr>";
                }
                $("#studentTable").html(htmlRows);
            });
        }
        $("#saveBtn").click(function () {
            var id = $("#studentID").val();

            var student = {
                name: $("#name").val(),
                email: $("#email").val(),
                major: $("#major").val()
            };

            $.ajax({
                url: id ? API + "/" + id : API,
                type: id ? "PUT" : "POST",
                contentType: "application/json",
                data: JSON.stringify(student),
                success: function () {
                    resetForm();
                    refresh();
                }
            });
        });
        // 3. DELETE: $.ajax for Delete
        function deleteStudent(id) {
            $.ajax({
                url: API + "/" + id,
                type: "DELETE",
                success: function() {
                    refresh();
                }
            });
        }

        // 4. EDIT: Fill form using .val()
        function editStudent(id, name, email, major) {
            $("#studentID").val(id);
            $("#name").val(name);
            $("#email").val(email);
            $("#major").val(major);
            $("#formTitle").html("Update Student #" + id);
        }

        function resetForm() {
            $("#studentID").val("");
            $("#name").val("");
            $("#email").val("");
            $("#major").val("");
            $("#formTitle").html("Register New Student");
        }

        // 5. SEARCH:
        $("#searchBtn").click(function() {
            var major = $("#searchMajor").val();

            if (!major) {
                refresh();
                return;
            }

            $.get(API + "/search?major=" + major, function(data) {

                var htmlRows = "";

                for (var i = 0; i < data.length; i++) {
                    var s = data[i];

                    htmlRows += "<tr>";
                    htmlRows += "<td>" + s.studentID + "</td>";
                    htmlRows += "<td>" + s.name + "</td>";
                    htmlRows += "<td>" + s.email + "</td>";
                    htmlRows += "<td>" + s.major + "</td>";
                    htmlRows += "<td>";

                    htmlRows += `<button class="btn" onclick="editStudent(${s.studentID}, '${s.name}', '${s.email}', '${s.major}')">Edit</button>`;
                    htmlRows += `<button class="btn btn-secondary" onclick="deleteStudent(${s.studentID})">Delete</button>`;

                    htmlRows += "</td>";
                    htmlRows += "</tr>";
                }

                $("#studentTable").html(htmlRows);
            });
        });

        $("#resetBtn").click(function() {
            $("#searchMajor").val("");
            refresh();
        });

        $(document).ready(refresh);
</script>
</body>
</html>
