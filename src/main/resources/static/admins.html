<!DOCTYPE html>
<html lang="en">
<head>
    <title>Campus Admin Registry</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#111;
            color:#f0f0f0;
            font-family:Georgia, serif;
        }

        h1{
            text-align:center;
            color:#ff6a00;
            margin-top:40px;
        }

        .divider{
            height:2px;
            background:#ff6a00;
            margin:20px 0;
        }

        .section{
            width:85%;
            margin:20px auto;
            background:#1b1b1b;
            padding:20px;
        }

        input{
            width:30%;
            padding:10px;
            background:#222;
            border:1px solid #444;
            color:white;
        }

        button{
            background:#ff6a00;
            color:#111;
            border:none;
            padding:10px 18px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#e05a00;
        }

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        th{
            color:#ff6a00;
            padding:12px;
        }

        td{
            padding:12px;
            border-top:1px solid #333;
        }

        .back-btn{
            margin:20px;
        }

    </style>
</head>

<body>

<h1>Campus Admin Registry</h1>
<div class="divider"></div>


<div class="section">

    <h3>Register / Update Admin</h3>

    <input id="adminName" placeholder="Admin Name">
    <input id="adminEmail" placeholder="Admin Email">
    <input id="role" placeholder="Role">

    <button onclick="saveAdmin()">Save</button>

</div>


<div class="section">

    <input id="searchBox" placeholder="Search by name">

    <button onclick="searchAdmin()">Search</button>
    <button onclick="loadAdmins()">Reset</button>

</div>


<div class="section">

    <table>

        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody id="adminTable"></tbody>

    </table>

</div>


<button class="back-btn"
        onclick="window.location.href='index.html'">
    Back
</button>


<script>

    let editingId=null;

    function loadAdmins(){

        fetch("/api/admins")
            .then(res=>res.json())
            .then(renderAdmins);

    }

    function renderAdmins(data){

        adminTable.innerHTML="";

        data.forEach(admin=>{

            adminTable.innerHTML+=`
<tr>
<td>${admin.adminID}</td>
<td>${admin.adminName}</td>
<td>${admin.adminEmail}</td>
<td>${admin.role}</td>
<td>
<button onclick="editAdmin(
${admin.adminID},
'${admin.adminName}',
'${admin.adminEmail}',
'${admin.role}'
)">Edit</button>

<button onclick="deleteAdmin(${admin.adminID})">
Delete
</button>
</td>
</tr>
`;

        });

    }

    function saveAdmin(){

        let admin={

            adminName:adminName.value,
            adminEmail:adminEmail.value,
            role:role.value

        };

        if(editingId==null){

            fetch("/api/admins",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify(admin)
            }).then(loadAdmins);

        }else{

            fetch(`/api/admins/${editingId}`,{
                method:"PUT",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify(admin)
            }).then(()=>{
                editingId=null;
                loadAdmins();
            });

        }

    }

    function editAdmin(id,name,email,roleValue){

        adminName.value=name;
        adminEmail.value=email;
        role.value=roleValue;

        editingId=id;

    }

    function deleteAdmin(id){

        fetch(`/api/admins/${id}`,{
            method:"DELETE"
        }).then(loadAdmins);

    }

    function searchAdmin(){

        fetch(`/api/admins/search?name=${searchBox.value}`)
            .then(res=>res.json())
            .then(renderAdmins);

    }

    loadAdmins();

</script>

</body>
</html>
