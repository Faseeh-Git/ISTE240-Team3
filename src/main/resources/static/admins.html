<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admins</title>

    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: sans-serif;
            margin: 0;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        .header {
            text-align: center;
            padding: 40px;
            border-bottom: 3px solid #ff6a00;
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #333;
        }

        input {
            width: 100%;
            padding: 10px;
            background: #2b2b2b;
            border: 1px solid #444;
            color: white;
        }

        .btn {
            background: #ff6a00;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background: #e05a00;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #444;
        }

        th {
            color: #ff6a00;
        }

        tr:hover {
            background: #2a2a2a;
        }
    </style>
</head>

<body>

<div class="header">
    <h1 style="color:#ff6a00;">Admin List</h1>
</div>

<div class="container">

    <div class="card">

        <input type="text" id="searchBox" placeholder="Search admin by name">
        <button class="btn" onclick="searchAdmin()">Search</button>

        <br><br>

        <button class="btn" onclick="loadAdmins()">Show All Admins</button>

        <br><br>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
            </tr>
            </thead>

            <tbody id="adminTable"></tbody>
        </table>

    </div>

    <button class="btn" onclick="window.location.href='index.html'">Back</button>

</div>

<script>

    function loadAdmins() {

        fetch('/api/admins')
            .then(response => response.json())
            .then(data => {

                let table = document.getElementById('adminTable');
                table.innerHTML = '';

                data.forEach(admin => {

                    table.innerHTML += `
<tr>
<td>${admin.adminID}</td>
<td>${admin.adminName}</td>
<td>${admin.adminEmail}</td>
<td>${admin.role}</td>
</tr>
`;
                });
            });
    }

    function searchAdmin() {

        let name = document.getElementById("searchBox").value;

        fetch(`/api/admins/search?name=${name}`)
            .then(response => response.json())
            .then(data => {

                let table = document.getElementById('adminTable');
                table.innerHTML = '';

                data.forEach(admin => {

                    table.innerHTML += `
<tr>
<td>${admin.adminID}</td>
<td>${admin.adminName}</td>
<td>${admin.adminEmail}</td>
<td>${admin.role}</td>
</tr>
`;
                });
            });
    }

    loadAdmins();

</script>

</body>
</html>
