<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registry</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: sans-serif;
            margin: 0;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .col {
            flex: 1;
            min-width: 200px;
        }

        .header {
            text-align: center;
            padding: 40px;
            border-bottom: 3px solid #ff6a00;
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #333;
        }

        input {
            width: 100%;
            padding: 10px;
            background: #2b2b2b;
            border: 1px solid #444;
            color: white;
        }

        .btn {
            background: #ff6a00;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background: #e05a00;
        }

        .btn-secondary {
            background: gray;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #444;
        }

        th {
            color: #ff6a00;
        }

        tr:hover {
            background: #2a2a2a;
        }
    </style>
</head>

<body>

<div class="header">
    <h1 style="color:#ff6a00;">Campus Admin Registry</h1>
</div>

<div class="container">

    <div class="card">
        <h3>Register New Admin</h3>

        <div class="row">
            <div class="col">
                <input type="text" id="adminName" placeholder="Admin Name">
            </div>

            <div class="col">
                <input type="email" id="adminEmail" placeholder="Admin Email">
            </div>

            <div class="col">
                <input type="text" id="role" placeholder="Role">
            </div>

            <div class="col">
                <button class="btn" id="saveBtn">Save</button>
            </div>
        </div>
    </div>


    <div class="card">
        <div class="row">
            <div class="col" style="flex:2;">
                <input type="text" id="searchName" placeholder="Search by name">
            </div>

            <div class="col" style="flex:1; display:flex; gap:10px;">
                <button class="btn" id="searchBtn">Search</button>
                <button class="btn-secondary" id="resetBtn">Reset</button>
            </div>
        </div>
    </div>


    <div class="card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
            </tr>
            </thead>

            <tbody id="adminTable"></tbody>
        </table>
    </div>

    <button class="btn" onclick="window.location.href='index.html'">Back</button>

</div>


<script>

    var API="/api/admins";

    function refresh(){

        $.get(API,function(data){

            var rows="";

            for(var i=0;i<data.length;i++){

                var a=data[i];

                rows+=`
<tr>
<td>${a.adminID}</td>
<td>${a.adminName}</td>
<td>${a.adminEmail}</td>
<td>${a.role}</td>
</tr>
`;

            }

            $("#adminTable").html(rows);

        });

    }


    $("#searchBtn").click(function(){

        var name=$("#searchName").val();

        if(!name){
            refresh();
            return;
        }

        $.get(API+"/search?name="+name,function(data){

            var rows="";

            for(var i=0;i<data.length;i++){

                var a=data[i];

                rows+=`
<tr>
<td>${a.adminID}</td>
<td>${a.adminName}</td>
<td>${a.adminEmail}</td>
<td>${a.role}</td>
</tr>
`;

            }

            $("#adminTable").html(rows);

        });

    });


    $("#resetBtn").click(function(){

        $("#searchName").val("");
        refresh();

    });


    $(document).ready(refresh);

</script>

</body>
</html>
