<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Events</title>

    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: sans-serif;
            margin: 0;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        .header {
            text-align: center;
            padding: 40px;
            border-bottom: 3px solid #ff6a00;
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #333;
        }

        .btn {
            background: #ff6a00;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background: #e05a00;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #444;
        }

        th {
            color: #ff6a00;
        }

        tr:hover {
            background: #2a2a2a;
        }
    </style>
</head>

<body>

<div class="header">
    <h1 style="color:#ff6a00;">Event List</h1>
</div>

<div class="container">

    <div class="card">

        <button class="btn" onclick="loadEvents()">Show Events</button>

        <br><br>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Location</th>
                <th>Date</th>
                <th>Host</th>
            </tr>
            </thead>

            <tbody id="eventTable"></tbody>
        </table>

    </div>

    <button class="btn" onclick="window.location.href='index.html'">Back</button>

</div>

<script>

    function loadEvents(){

        fetch('/api/events')
            .then(response => response.json())
            .then(data => {

                let table=document.getElementById('eventTable');
                table.innerHTML='';

                data.forEach(event=>{

                    table.innerHTML+=`
<tr>
<td>${event.eventID}</td>
<td>${event.eventName}</td>
<td>${event.eventDescription}</td>
<td>${event.eventLocation}</td>
<td>${event.date}</td>
<td>${event.hostName}</td>
</tr>
`;

                });
            });
    }

    loadEvents();

</script>

</body>
</html>
