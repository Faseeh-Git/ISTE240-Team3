<!DOCTYPE html>
<html>
<head>
    <title>Events</title>
</head>
<body>

<h2>Event List</h2>

<input type="text" id="searchBox" placeholder="Search event by name">
<button onclick="searchEvent()">Search</button>

<br><br>

<button onclick="loadEvents()">Show All Events</button>

<br><br>

<table border="1">

    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
        <th>Location</th>
        <th>Date</th>
        <th>Host</th>
    </tr>
    </thead>

    <tbody id="eventTable"></tbody>

</table>

<script>

    function loadEvents() {

        fetch('/api/events')
            .then(response => response.json())
            .then(data => {

                let table = document.getElementById('eventTable');
                table.innerHTML = '';

                data.forEach(event => {

                    table.innerHTML += `
                    <tr>
                        <td>${event.eventID}</td>
                        <td>${event.eventName}</td>
                        <td>${event.eventDescription}</td>
                        <td>${event.eventLocation}</td>
                        <td>${event.date}</td>
                        <td>${event.hostName}</td>
                    </tr>
                `;
                });
            });
    }

    function searchEvent() {

        let name = document.getElementById("searchBox").value;

        fetch(`/api/events/search?name=${name}`)
            .then(response => response.json())
            .then(data => {

                let table = document.getElementById('eventTable');
                table.innerHTML = '';

                data.forEach(event => {

                    table.innerHTML += `
                    <tr>
                        <td>${event.eventID}</td>
                        <td>${event.eventName}</td>
                        <td>${event.eventDescription}</td>
                        <td>${event.eventLocation}</td>
                        <td>${event.date}</td>
                        <td>${event.hostName}</td>
                    </tr>
                `;
                });
            });
    }

    loadEvents();

</script>

</body>
</html>
