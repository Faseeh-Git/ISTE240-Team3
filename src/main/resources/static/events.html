<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registry</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: sans-serif;
            margin: 0;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .col {
            flex: 1;
            min-width: 200px;
        }

        .header {
            text-align: center;
            padding: 40px;
            border-bottom: 3px solid #ff6a00;
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #333;
        }

        input {
            width: 100%;
            padding: 10px;
            background: #2b2b2b;
            border: 1px solid #444;
            color: white;
        }

        .btn {
            background: #ff6a00;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background: #e05a00;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #444;
        }

        th {
            color: #ff6a00;
        }

        tr:hover {
            background: #2a2a2a;
        }
    </style>
</head>

<body>

<div class="header">
    <h1 style="color:#ff6a00;">Campus Event Registry</h1>
</div>

<div class="container">

    <div class="card">
        <h3>Search Events</h3>

        <div class="row">

            <div class="col">
                <input type="text" id="searchName" placeholder="Search by event name">
            </div>

            <div class="col">
                <button class="btn" id="searchBtn">Search</button>
            </div>

        </div>

    </div>


    <div class="card">

        <table>

            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Location</th>
                <th>Date</th>
                <th>Host</th>
            </tr>
            </thead>

            <tbody id="eventTable"></tbody>

        </table>

    </div>


    <button class="btn" onclick="window.location.href='index.html'">Back</button>

</div>


<script>

    var API="/api/events";


    function refresh(){

        $.get(API,function(data){

            var rows="";

            for(var i=0;i<data.length;i++){

                var e=data[i];

                rows+=`
<tr>
<td>${e.eventID}</td>
<td>${e.eventName}</td>
<td>${e.eventDescription}</td>
<td>${e.eventLocation}</td>
<td>${e.date}</td>
<td>${e.hostName}</td>
</tr>
`;

            }

            $("#eventTable").html(rows);

        });

    }


    $("#searchBtn").click(function(){

        var name=$("#searchName").val();

        if(!name){
            refresh();
            return;
        }

        $.get(API+"/search?name="+name,function(data){

            var rows="";

            for(var i=0;i<data.length;i++){

                var e=data[i];

                rows+=`
<tr>
<td>${e.eventID}</td>
<td>${e.eventName}</td>
<td>${e.eventDescription}</td>
<td>${e.eventLocation}</td>
<td>${e.date}</td>
<td>${e.hostName}</td>
</tr>
`;

            }

            $("#eventTable").html(rows);

        });

    });


    $(document).ready(refresh);

</script>

</body>
</html>
