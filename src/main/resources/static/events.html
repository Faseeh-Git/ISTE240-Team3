<!DOCTYPE html>
<html lang="en">
<head>
    <title>Campus Event Registry</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#111;
            color:#f0f0f0;
            font-family:Georgia, serif;
        }

        h1{
            text-align:center;
            color:#ff6a00;
            margin-top:40px;
        }

        .divider{
            height:2px;
            background:#ff6a00;
            margin:20px 0;
        }

        .section{
            width:85%;
            margin:20px auto;
            background:#1b1b1b;
            padding:20px;
        }

        input{
            width:18%;
            padding:10px;
            background:#222;
            border:1px solid #444;
            color:white;
        }

        button{
            background:#ff6a00;
            color:#111;
            border:none;
            padding:10px 18px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#e05a00;
        }

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        th{
            color:#ff6a00;
            padding:12px;
        }

        td{
            padding:12px;
            border-top:1px solid #333;
        }

        .back-btn{
            margin:20px;
        }

    </style>
</head>

<body>

<h1>Campus Event Registry</h1>
<div class="divider"></div>


<div class="section">

    <h3>Register / Update Event</h3>

    <input id="eventName" placeholder="Event Name">
    <input id="eventDescription" placeholder="Description">
    <input id="eventLocation" placeholder="Location">
    <input id="date" placeholder="Date">
    <input id="hostName" placeholder="Host">

    <button onclick="saveEvent()">Save</button>

</div>


<div class="section">

    <input id="searchBox" placeholder="Search by event name">

    <button onclick="searchEvent()">Search</button>
    <button onclick="loadEvents()">Reset</button>

</div>


<div class="section">

    <table>

        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Description</th>
            <th>Location</th>
            <th>Date</th>
            <th>Host</th>
            <th>Edit</th>
        </tr>
        </thead>

        <tbody id="eventTable"></tbody>

    </table>

</div>


<button class="back-btn"
        onclick="window.location.href='index.html'">
    Back
</button>


<script>

    let editingId=null;

    function loadEvents(){

        fetch("/api/events")
            .then(res=>res.json())
            .then(renderEvents);

    }

    function renderEvents(data){

        eventTable.innerHTML="";

        data.forEach(event=>{

            eventTable.innerHTML+=`
<tr>
<td>${event.eventID}</td>
<td>${event.eventName}</td>
<td>${event.eventDescription}</td>
<td>${event.eventLocation}</td>
<td>${event.date}</td>
<td>${event.hostName}</td>
<td>
<button onclick="editEvent(
${event.eventID},
'${event.eventName}',
'${event.eventDescription}',
'${event.eventLocation}',
'${event.date}',
'${event.hostName}'
)">Edit</button>
</td>
</tr>
`;

        });

    }

    function saveEvent(){

        let event={

            eventName:eventName.value,
            eventDescription:eventDescription.value,
            eventLocation:eventLocation.value,
            date:date.value,
            hostName:hostName.value

        };

        if(editingId==null){

            fetch("/api/events",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify(event)
            }).then(loadEvents);

        }else{

            fetch(`/api/events/${editingId}`,{
                method:"PUT",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify(event)
            }).then(()=>{
                editingId=null;
                loadEvents();
            });

        }

    }

    function editEvent(id,name,desc,location,dateValue,host){

        eventName.value=name;
        eventDescription.value=desc;
        eventLocation.value=location;
        date.value=dateValue;
        hostName.value=host;

        editingId=id;

    }

    function searchEvent(){

        fetch(`/api/events/search?name=${searchBox.value}`)
            .then(res=>res.json())
            .then(renderEvents);

    }

    loadEvents();

</script>

</body>
</html>
